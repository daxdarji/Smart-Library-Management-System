<h1 style="text-align:center;">Issue a Book</h1>

<div class="issue-container">

<form class="issue-form">

<input type="text" placeholder="Student Name" required>

<!-- ✅ DROPDOWN (IMPORTANT) -->
<select id="bookName" required>

<option value="">Select Book</option>

<!-- Science -->
<option>What Is Science?</option>
<option>Science Based On Curiosity</option>
<option>Treasure Of Fruit Science</option>
<option>Encyclopedia Of General Science</option>
<option>Quantum Physics And The Power Of Mind</option>

<!-- Spiritual -->
<option>Bhagavad Gita</option>
<option>Journey To GOD</option>
<option>The Seven Spiritual Laws Of Success</option>
<option>The Alchemist</option>
<option>Gita Vedanta Hinduism Buddha Vivekananda</option>

<!-- Novels -->
<option>A Thousand Splendid Suns</option>
<option>The Book Of Life</option>
<option>To Kill A Mockingbird</option>
<option>The Tree Of Light And Flowers</option>
<option>The Book Of Everlasting Things</option>

<!-- Hindi -->
<option>Gunda</option>
<option>Gunaho Ka Devta</option>
<option>Vardaan</option>
<option>Aapka Bunty</option>
<option>Goodan</option>

<!-- Self Help -->
<option>Atomic Habits</option>
<option>Self Help</option>
<option>The Psychology Of Money</option>
<option>Rich Dad Poor Dad</option>
<option>Tools For Life </option>

<!-- Biography -->
<option>Albert Einstein</option>
<option>Dr APJ Abdul Kalam</option>
<option>The Diary Of A Young Girl</option>
<option>Steve Jobs</option>
<option>Nelson Mandela</option>

<!-- Fiction -->
<option>Harry Potter And The Deathly Hallows</option>
<option>To The Bright Edge Of The World</option>
<option>The Vines</option>
<option>Indian Detective Fiction Vol-1</option>
<option>The Magic Of The Lost Earings</option>

</select>

<input type="date" required>

<button type="submit">Issue Book</button>

</form>

<!-- RULES -->
<div class="rules-box">

<h3>Rules for Issuing Books</h3>

<ul>
<li>Only registered members can issue books.</li>
<li>Maximum 2 books per student.</li>
<li>Return period is 14 days.</li>
<li>Late return will result in a fine.</li>
<li>Books must be kept in good condition.</li>
</ul>

</div>

</div>

<!-- ✅ JAVASCRIPT LINK -->
<script src="script.js"></script>
